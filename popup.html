<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevShield - Web Security Inspector</title>
  <style>
    /* Light Mode Theme */
    [data-theme="light"] {
      --bg-primary: #ffffff;
      --bg-secondary: #f6f8fa;
      --bg-tertiary: #eaeef2;
      --text-primary: #1f2328;
      --text-secondary: #656d76;
      --accent-green: #1a7f37;
      --accent-yellow: #9a6700;
      --accent-red: #cf222e;
      --accent-blue: #0969da;
      --border-color: #d0d7de;
    }

    [data-theme="light"] .score-circle::before {
      background: #ffffff;
    }

    [data-theme="light"] .url-display {
      background: #f6f8fa;
    }

    [data-theme="light"] .header {
      background: linear-gradient(135deg, #f6f8fa 0%, #ffffff 100%);
    }

    [data-theme="light"] ::-webkit-scrollbar-track {
      background: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --text-primary: #f0f6fc;
      --text-secondary: #8b949e;
      --accent-green: #3fb950;
      --accent-yellow: #d29922;
      --accent-red: #f85149;
      --accent-blue: #58a6ff;
      --border-color: #30363d;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      width: 380px;
      min-height: 500px;
    }

    .header {
      background: linear-gradient(135deg, #1a1f2e 0%, #0d1117 100%);
      padding: 16px;
      border-bottom: 1px solid var(--border-color);
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h1 span {
      color: var(--accent-blue);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .theme-toggle {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s;
    }

    .theme-toggle:hover {
      background: var(--border-color);
    }

    .url-display {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 8px;
      word-break: break-all;
      background: var(--bg-tertiary);
      padding: 8px;
      border-radius: 6px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      font-size: 12px;
    }

    .https-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: 500;
    }

    .https-badge.secure {
      background: rgba(63, 185, 80, 0.15);
      color: var(--accent-green);
    }

    .https-badge.insecure {
      background: rgba(248, 81, 73, 0.15);
      color: var(--accent-red);
    }

    .scores-section {
      padding: 16px;
      border-bottom: 1px solid var(--border-color);
    }

    .overall-score {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .score-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      position: relative;
    }

    .score-circle.safe {
      background: conic-gradient(var(--accent-green) 0% 100%);
      color: var(--accent-green);
    }

    .score-circle.moderate {
      background: conic-gradient(var(--accent-yellow) 0% 100%);
      color: var(--accent-yellow);
    }

    .score-circle.high {
      background: conic-gradient(var(--accent-red) 0% 100%);
      color: var(--accent-red);
    }

    .score-circle::before {
      content: '';
      position: absolute;
      width: 64px;
      height: 64px;
      background: var(--bg-primary);
      border-radius: 50%;
    }

    .score-circle span {
      position: relative;
      z-index: 1;
    }

    .risk-label {
      font-size: 14px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 4px;
    }

    .risk-label.safe {
      background: rgba(63, 185, 80, 0.15);
      color: var(--accent-green);
    }

    .risk-label.moderate {
      background: rgba(210, 153, 34, 0.15);
      color: var(--accent-yellow);
    }

    .risk-label.high {
      background: rgba(248, 81, 73, 0.15);
      color: var(--accent-red);
    }

    .score-breakdown {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .score-item {
      background: var(--bg-secondary);
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }

    .score-item h3 {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .score-item .value {
      font-size: 20px;
      font-weight: 600;
    }

    .score-item .value.good {
      color: var(--accent-green);
    }

    .score-item .value.warning {
      color: var(--accent-yellow);
    }

    .score-item .value.danger {
      color: var(--accent-red);
    }

    .issues-section {
      padding: 16px;
      max-height: 200px;
      overflow-y: auto;
    }

    .issues-section h2 {
      font-size: 14px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .issue-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px;
      background: var(--bg-secondary);
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .issue-item.security {
      border-left: 3px solid var(--accent-red);
    }

    .issue-item.structure {
      border-left: 3px solid var(--accent-yellow);
    }

    .issue-icon {
      font-size: 14px;
      flex-shrink: 0;
    }

    .issue-text {
      color: var(--text-secondary);
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }

    .empty-state .icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .analyze-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent-blue);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .analyze-btn:hover {
      background: #4090e8;
    }

    .analyze-btn:disabled {
      background: var(--bg-tertiary);
      cursor: not-allowed;
    }

    .footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border-color);
      text-align: center;
      font-size: 11px;
      color: var(--text-secondary);
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <h1><span>🛡️</span> DevShield</h1>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>
    </div>
    <div class="url-display" id="urlDisplay">Click analyze to scan page</div>
    <div class="status-bar">
      <span class="https-badge" id="httpsBadge">-</span>
      <span id="statusText">Ready to analyze</span>
    </div>
  </div>

  <div class="scores-section">
    <div class="overall-score">
      <div class="score-circle" id="overallScore">
        <span>-</span>
      </div>
      <div class="risk-label" id="riskLabel">-</div>
    </div>
    <div class="score-breakdown">
      <div class="score-item">
        <h3>Structure</h3>
        <div class="value" id="structureScore">-</div>
      </div>
      <div class="score-item">
        <h3>Security</h3>
        <div class="value" id="securityScore">-</div>
      </div>
    </div>
  </div>

  <div class="issues-section">
    <h2>⚠️ Detected Issues</h2>
    <div id="issuesList">
      <div class="empty-state">
        <div class="icon">📋</div>
        <p>Click analyze to scan for issues</p>
      </div>
    </div>
  </div>

  <div class="footer">
    DevShield v1.0 • OWASP-Inspired Security Scanner
  </div>

  <script src="popup.js"></script>
</body>
</html>
